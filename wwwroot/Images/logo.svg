<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&amp;family=DM+Sans:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="340" fill="white"/>

  <!-- ── Logomark: abstract calendar/event tile cluster ── -->
  <!-- Anchor tile -->
  <rect x="160" y="90" width="62" height="62" rx="10" fill="#1B1464"/>
  <!-- Top notch -->
  <rect x="177" y="84" width="10" height="14" rx="5" fill="#1B1464"/>
  <rect x="205" y="84" width="10" height="14" rx="5" fill="#1B1464"/>

  <!-- Smaller accent tile (top-right, teal) -->
  <rect x="232" y="78" width="42" height="42" rx="8" fill="#0DB7A0"/>
  <rect x="246" y="72" width="7" height="11" rx="3.5" fill="#0DB7A0"/>
  <rect x="260" y="72" width="7" height="11" rx="3.5" fill="#0DB7A0"/>

  <!-- Smaller accent tile (bottom-right, coral) -->
  <rect x="238" y="132" width="38" height="38" rx="8" fill="#FF6B6B"/>
  <rect x="251" y="126" width="7" height="10" rx="3.5" fill="#FF6B6B"/>
  <rect x="264" y="126" width="7" height="10" rx="3.5" fill="#FF6B6B"/>

  <!-- Grid lines on anchor tile -->
  <line x1="178" y1="120" x2="214" y2="120" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <line x1="178" y1="130" x2="214" y2="130" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <line x1="191" y1="108" x2="191" y2="148" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <line x1="203" y1="108" x2="203" y2="148" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>

  <!-- Dot grid on teal tile -->
  <circle cx="247" cy="98"  r="2.2" fill="white" opacity="0.55"/>
  <circle cx="256" cy="98"  r="2.2" fill="white" opacity="0.55"/>
  <circle cx="265" cy="98"  r="2.2" fill="white" opacity="0.55"/>
  <circle cx="247" cy="108" r="2.2" fill="white" opacity="0.55"/>
  <circle cx="256" cy="108" r="2.2" fill="white" opacity="0.55"/>
  <circle cx="265" cy="108" r="2.2" fill="white" opacity="0.55"/>

  <!-- Check mark on coral tile -->
  <path d="M250 151 L256 158 L268 143" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Wordmark ── -->
  <text
    font-family="'DM Serif Display', Georgia, serif"
    font-size="58"
    fill="#1B1464"
    x="296"
    y="162"
    letter-spacing="-1">Event</text>

  <text
    font-family="'DM Serif Display', Georgia, serif"
    font-size="58"
    fill="#0DB7A0"
    x="296"
    y="218"
    letter-spacing="-1">Ease</text>

  <!-- Thin rule -->
  <line x1="296" y1="228" x2="540" y2="228" stroke="#D3D1C7" stroke-width="0.8"/>

  <!-- Tagline -->
  <text
    font-family="'DM Sans', sans-serif"
    font-size="13"
    fill="#888780"
    font-weight="400"
    x="296"
    y="245"
    letter-spacing="3.5">EVENT MANAGEMENT</text>

</svg>
